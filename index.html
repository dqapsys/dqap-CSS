
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>DQAP CSS</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect fill='%23006994' width='64' height='64' rx='12'/%3E%3Cpath d='M18 22a14 14 0 0 1 28 0v12a6 6 0 0 1-6 6h-5' fill='none' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3Ccircle cx='32' cy='40' r='4' fill='white'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--p:#006994;--pd:#004A68;--pl:#E4F1FA;--bg:#F4F6FA;--card:#fff;--t1:#111;--t2:#666;--bd:rgba(0,0,0,.11);--bds:rgba(0,0,0,.22);--rad:10px;--ok:#1B5E20;--warn:#E65100;--bad:#B71C1C}
    body{font-family:'DM Sans','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t1);font-size:13px}
    .container{max-width:1420px;margin:0 auto;padding:20px}
    .header{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;padding:26px 22px;border-radius:var(--rad);margin-bottom:16px;display:flex;justify-content:space-between;gap:16px;align-items:center}
    .header h1{font-size:26px;margin-bottom:5px;display:flex;align-items:center;gap:10px;font-weight:700}
    .header p{opacity:.9;font-size:13px}.userbox{background:rgba(255,255,255,.18);padding:11px 14px;border-radius:8px;min-width:210px}.userbox .lbl{font-size:10px;opacity:.85;margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px}.userbox .nm{font-size:13px;font-weight:700}
    .tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}.tab-btn{padding:9px 14px;border-radius:7px;border:1px solid var(--bds);background:var(--card);color:var(--t1);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:6px}.tab-btn:hover{border-color:var(--p);background:var(--pl)}.tab-btn.active{background:var(--p);color:#fff;border-color:var(--p)}
    .tab-content{display:none}.tab-content.active{display:block}.card{background:var(--card);border-radius:var(--rad);border:.5px solid var(--bd);padding:16px;margin-bottom:14px}.card-header{font-size:13px;font-weight:700;margin:-16px -16px 14px;padding:12px 16px;border-bottom:.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:10px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:14px}.stat{background:var(--card);border-radius:var(--rad);border:.5px solid var(--bd);padding:13px;display:flex;gap:11px;align-items:center}.stat-icon{width:36px;height:36px;background:var(--pl);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--p);font-size:19px;flex-shrink:0}.stat-value{font-size:20px;font-weight:700;color:var(--p)}.stat-label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}
    table{width:100%;border-collapse:collapse}th{padding:9px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;background:#f5f5f5;border-bottom:.5px solid var(--bd);color:var(--t2)}td{padding:9px 10px;border-bottom:.5px solid var(--bd);vertical-align:top}tr:hover td{background:#fafafa}.table-wrap{overflow-x:auto}
    .btn{padding:7px 12px;border-radius:7px;border:.5px solid var(--bds);background:transparent;color:var(--t1);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-family:inherit;white-space:nowrap}.btn:hover{background:#f0f0f0}.btn.primary{background:var(--p);color:#fff;border-color:var(--p)}.btn.primary:hover{background:var(--pd)}.btn.ok{background:var(--ok);color:#fff;border-color:var(--ok)}.btn.bad{color:var(--bad);border-color:#EF9A9A}.btn.sm{padding:5px 9px;font-size:11px}.btn:disabled{opacity:.45;cursor:not-allowed}
    input,select,textarea{font-family:inherit}input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:7px;background:#fafafa;color:var(--t1);font-size:12.5px}input:focus,select:focus,textarea:focus{outline:none;border-color:var(--p);background:#fff}textarea{min-height:78px;resize:vertical}.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:12px}.form-group label{display:block;font-size:10.5px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}.req::after{content:' *';color:var(--bad)}
    .queue-layout{display:grid;grid-template-columns:390px minmax(0,1fr);gap:14px;align-items:start}.ticket-list{display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 210px);overflow:auto}.ticket-row{border:.5px solid var(--bd);background:#fff;border-radius:8px;padding:10px 12px;cursor:pointer}.ticket-row:hover,.ticket-row.selected{border-color:var(--p);background:#F8FCFF}.ticket-title{display:flex;justify-content:space-between;gap:8px;font-weight:700;font-size:12.5px}.ticket-meta{font-size:11px;color:var(--t2);margin-top:4px;line-height:1.45}.detail-box{min-height:420px}.message{background:#fafafa;border:.5px solid var(--bd);border-left:3px solid var(--p);border-radius:8px;padding:11px 12px;margin:10px 0}.message b{display:block;font-size:12px;margin-bottom:4px}.message p{font-size:12.5px;line-height:1.55;white-space:pre-wrap}.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}.filters .btn.active{background:var(--p);color:#fff;border-color:var(--p)}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap}.s-open{background:#E3F2FD;color:#006994}.s-pending{background:#FFF3E0;color:#E65100}.s-closed{background:#E8F5E9;color:#1B5E20}.s-urgent{background:#FFEBEE;color:#B71C1C}.s-high{background:#FFF3E0;color:#E65100}.s-medium{background:#FFFDE7;color:#F57F17}.s-low{background:#E8F5E9;color:#1B5E20}.s-neutral{background:#ECEFF1;color:#455A64}
    .muted{color:var(--t2);font-size:11px}.strong{font-weight:700}.right{text-align:right}.hidden{display:none!important}.empty{text-align:center;color:var(--t2);padding:30px 12px}.audit-row{display:grid;grid-template-columns:145px 150px 1fr;gap:10px;border-bottom:.5px solid var(--bd);padding:9px 0}.toast{position:fixed;right:18px;bottom:18px;background:#1A237E;color:#fff;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:600;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.18)}.toast.error{background:var(--bad)}.toast.success{background:var(--ok)}
    .error-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;z-index:99}.error-card{background:#fff;border-radius:12px;border:.5px solid var(--bd);box-shadow:0 10px 30px rgba(0,0,0,.12);max-width:520px;padding:26px;text-align:center}.error-card h2{color:var(--bad);margin-bottom:8px}
    @media(max-width:900px){.queue-layout{grid-template-columns:1fr}.ticket-list{max-height:330px}}
    @media(max-width:720px){.container{padding:12px}.header{align-items:flex-start;flex-direction:column}.audit-row{grid-template-columns:1fr}.tabs{gap:6px}.tab-btn{padding:8px 10px}.card{padding:12px}.card-header{margin:-12px -12px 12px;padding:10px 12px}}
  </style>
</head>
<body>
<div id="appContainer" class="container" style="display:none">
  <div class="header">
    <div><h1><i class="ti ti-headset"></i> CSS</h1><p>Customer support tickets, assignment, replies and closure tracking</p></div>
    <div class="userbox"><div class="lbl">Logged in as</div><div class="nm" id="currentUser">-</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')"><i class="ti ti-layout-dashboard"></i>Dashboard</button>
    <button class="tab-btn" data-tab="tickets" onclick="switchTab('tickets')"><i class="ti ti-list-check"></i>Tickets</button>
    <button class="tab-btn" data-tab="new" onclick="switchTab('new')"><i class="ti ti-plus"></i>New Ticket</button>
    <button class="tab-btn" data-tab="audit" onclick="switchTab('audit')"><i class="ti ti-history"></i>Audit Trail</button>
    <button class="tab-btn" data-tab="settings" id="settingsTabBtn" onclick="switchTab('settings')" style="display:none"><i class="ti ti-settings"></i>Settings</button>
  </div>

  <section id="tab-dashboard" class="tab-content active"></section>
  <section id="tab-tickets" class="tab-content"></section>
  <section id="tab-new" class="tab-content"></section>
  <section id="tab-audit" class="tab-content"></section>
  <section id="tab-settings" class="tab-content"></section>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBV2ZQwfqvgPyzLz75wsSIg9N5gjPHY-R8",
  authDomain:"dqap-wiki.firebaseapp.com",
  projectId:"dqap-wiki",
  storageBucket:"dqap-wiki.firebasestorage.app",
  messagingSenderId:"932523956178",
  appId:"1:932523956178:web:cc83a8e7369eaa80649a0b"
});
const db=firebase.firestore();
const TICKET_COL='css_tickets',USERS_COL='dqap_users',PROJ_COL='dqap_projects',CRM_CUSTOMERS='dqap_crm_customers',CRM_DEALS='dqap_crm_deals',SETTINGS_COL='dqap_css_settings';
const CSS_BUILD='20260712.1';
let currentUser=null,currentUserRole=null,currentUserData=null,wikiSession=null,authInitialized=false;
let ticketsData=[],usersData=[],projectsData=[],contactsData=[],dealsData=[],cssSettings={categories:['Fire Detection','PA/VA System','Gas Suppression','Surveillance','Access Control','Other']};
let ticketsUnsub=null,settingsUnsub=null,activeTab='dashboard',activeFilter='all',selectedTicketId='';

function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function el(id){return document.getElementById(id)}
function g(id){return(el(id)?.value||'').trim()}
function norm(s){return String(s||'').trim().toLowerCase()}
function nowIso(){return new Date().toISOString()}
function roleName(){return currentUserData?.displayName||currentUserData?.fullName||currentUser||'-'}
function isAdmin(){return ['admin','tech_admin'].includes(norm(currentUserRole))||norm(currentUser)==='updesh'}
function canManageSettings(){return isAdmin()||norm(currentUser)==='updesh'}
function showToast(msg,type='success'){const t=document.createElement('div');t.className='toast '+(type==='error'?'error':'success');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3200)}
function showError(message){const d=document.createElement('div');d.className='error-screen';d.innerHTML=`<div class="error-card"><h2>CSS Access</h2><p style="color:var(--t2);line-height:1.6">${esc(message)}</p><button class="btn primary" style="margin-top:16px" onclick="location.href='https://dqapsys.github.io/dqap-wiki/'">Go to Wiki</button></div>`;document.body.appendChild(d);el('appContainer').style.display='none'}
function fmtDate(v){const d=v?.toDate?.()||new Date(v||Date.now());return Number.isNaN(d.getTime())?'-':d.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}
function dateOnly(v){const d=v?.toDate?.()||new Date(v||Date.now());return Number.isNaN(d.getTime())?'-':d.toISOString().slice(0,10)}
function timeValue(v){const d=v?.toDate?.()||new Date(v||0);return Number.isNaN(d.getTime())?0:d.getTime()}
function statusKey(s){const k=norm(s||'Open');return k==='pending'?'pending reply':k}

function initializeAuth(){
  if(authInitialized)return;authInitialized=true;
  let sess=null;
  const fragment=new URLSearchParams(window.location.hash.slice(1));
  const query=new URLSearchParams(window.location.search);
  const handoffSession=fragment.get('sess')||query.get('sess');
  const receivedHandoff=!!handoffSession;
  try{sess=sessionStorage.getItem('dqap_sess')}catch(e){}
  if(!sess){
    try{const bridge=JSON.parse(localStorage.getItem('dqap_css_handoff')||'null');if(bridge&&bridge.session&&Date.now()-Number(bridge.ts||0)<10*60*1000)sess=bridge.session}catch(e){}
  }
  if(!sess)sess=handoffSession;
  if(sess){try{sessionStorage.setItem('dqap_sess',sess);localStorage.setItem('dqap_css_handoff',JSON.stringify({session:sess,ts:Date.now()}));}catch(e){} if(receivedHandoff)history.replaceState(null,document.title,window.location.pathname+window.location.search)}
  if(!sess){showError('This page must be accessed through the Wiki portal. Please login to Wiki first.');return}
  try{wikiSession=JSON.parse(sess);autoLoginFromWiki(wikiSession)}catch(e){showError('Session error. Please login to Wiki and try again.')}
}
async function autoLoginFromWiki(session){
  try{
    const username=session.username,displayName=session.displayName||session.fullName||username;
    const usersRef=db.collection(USERS_COL);
    const q=await usersRef.where('username','==',username).limit(1).get();
    let userData=!q.empty?q.docs[0].data():null;
    if(!userData){const legacy=await usersRef.doc(username).get();if(legacy.exists)userData=legacy.data()}
    if(!userData&&session.username&&session.role)userData={username:session.username,fullName:session.fullName||displayName,displayName,role:session.role,isAdmin:session.isAdmin};
    if(!userData){showError(`User "${username}" not found in Wiki users.`);return}
    currentUser=username;currentUserRole=userData.role||'user';currentUserData={...userData,displayName:userData.displayName||userData.fullName||displayName};
    el('currentUser').textContent=`${currentUserData.displayName||username} (${currentUserRole})`;
    el('appContainer').style.display='block';
    el('settingsTabBtn').style.display=canManageSettings()?'flex':'none';
    await loadReferenceData();
    startSettingsListen();
    startTicketsListen();
    showToast('Welcome, '+(currentUserData.displayName||username));
  }catch(error){showError('Login failed: '+error.message)}
}
async function loadReferenceData(){
  const [usersSnap,projSnap,contactsSnap,dealsSnap]=await Promise.allSettled([
    db.collection(USERS_COL).orderBy('fullName','asc').get(),
    db.collection(PROJ_COL).orderBy('createdAt','desc').get(),
    db.collection(CRM_CUSTOMERS).limit(300).get(),
    db.collection(CRM_DEALS).limit(300).get()
  ]);
  if(usersSnap.status==='fulfilled')usersData=usersSnap.value.docs.map(d=>({id:d.id,...d.data()}));
  if(projSnap.status==='fulfilled')projectsData=projSnap.value.docs.map(d=>({id:d.id,...d.data()}));
  if(contactsSnap.status==='fulfilled')contactsData=contactsSnap.value.docs.map(d=>({id:d.id,...d.data()}));
  if(dealsSnap.status==='fulfilled')dealsData=dealsSnap.value.docs.map(d=>({id:d.id,...d.data()}));
}
function startTicketsListen(){
  if(ticketsUnsub)ticketsUnsub();
  ticketsUnsub=db.collection(TICKET_COL).onSnapshot(sn=>{ticketsData=sn.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>timeValue(b.updatedAt||b.updated)-timeValue(a.updatedAt||a.updated));renderAll()},err=>showToast('Could not load CSS tickets: '+err.message,'error'));
}
function startSettingsListen(){
  if(settingsUnsub)settingsUnsub();
  settingsUnsub=db.collection(SETTINGS_COL).doc('config').onSnapshot(doc=>{cssSettings=doc.exists?{...cssSettings,...doc.data()}:cssSettings;renderAll()},()=>{});
}

function switchTab(tab){if(tab==='settings'&&!canManageSettings())return showToast('Only admin users can open CSS settings','error');activeTab=tab;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tab-'+tab));renderAll()}
function renderAll(){renderDashboard();renderTickets();renderNew();renderAudit();renderSettings()}
function statusBadge(s){const k=statusKey(s);return`<span class="badge s-${k==='pending reply'?'pending':k}">${esc(k==='pending reply'?'Pending Reply':(s||'Open'))}</span>`}
function priorityBadge(p){const k=norm(p||'Medium');return`<span class="badge s-${k}">${esc(String(p||'Medium').toUpperCase())}</span>`}
function userOptions(selected=''){return usersData.map(u=>{const v=u.username||u.fullName||u.id;const label=u.fullName||u.displayName||u.username||u.id;return`<option value="${esc(v)}" ${norm(v)===norm(selected)||norm(label)===norm(selected)?'selected':''}>${esc(label)} (${esc(u.role||'user')})</option>`}).join('')}
function projectLabel(id){const p=projectsData.find(x=>x.id===id);return p?`${p.number||''} ${p.name||p.projName||''}`.trim():'-'}
function crmLabel(type,id){const row=(type==='Deal'?dealsData:contactsData).find(x=>x.id===id);return row?(type==='Deal'?(row.title||row.dealTitle||'Deal'):(row.name||row.company||'Contact')):'-'}

function renderDashboard(){
  const total=ticketsData.length,open=ticketsData.filter(t=>statusKey(t.status)==='open').length,pending=ticketsData.filter(t=>statusKey(t.status)==='pending reply').length,closed=ticketsData.filter(t=>statusKey(t.status)==='closed').length,urgent=ticketsData.filter(t=>t.priority==='Urgent'&&statusKey(t.status)!=='closed').length;
  el('tab-dashboard').innerHTML=`<div class="stats">
    <div class="stat"><div class="stat-icon"><i class="ti ti-ticket"></i></div><div><div class="stat-value">${total}</div><div class="stat-label">Total tickets</div></div></div>
    <div class="stat"><div class="stat-icon"><i class="ti ti-inbox"></i></div><div><div class="stat-value">${open}</div><div class="stat-label">Open</div></div></div>
    <div class="stat"><div class="stat-icon"><i class="ti ti-message-reply"></i></div><div><div class="stat-value">${pending}</div><div class="stat-label">Pending reply</div></div></div>
    <div class="stat"><div class="stat-icon"><i class="ti ti-alert-triangle"></i></div><div><div class="stat-value">${urgent}</div><div class="stat-label">Urgent open</div></div></div>
  </div><div class="card"><div class="card-header">Recent support tickets <button class="btn sm primary" onclick="switchTab('new')"><i class="ti ti-plus"></i>New</button></div>${ticketTable(ticketsData.slice(0,10),false)}</div>`;
}
function renderTickets(){
  const filtered=activeFilter==='all'?ticketsData:ticketsData.filter(t=>statusKey(t.status)===activeFilter);
  const selected=filtered.find(t=>t.id===selectedTicketId)||filtered[0]||null;
  if(selected)selectedTicketId=selected.id;
  el('tab-tickets').innerHTML=`<div class="filters">
    ${['all','open','pending reply','closed'].map(f=>`<button class="btn sm ${activeFilter===f?'active':''}" onclick="setFilter('${f}')">${f==='all'?'All':f.replace(/\b\w/g,m=>m.toUpperCase())}</button>`).join('')}
  </div><div class="queue-layout"><div class="ticket-list">${filtered.length?filtered.map(ticketRow).join(''):'<div class="card empty">No tickets found.</div>'}</div><div class="card detail-box">${selected?ticketDetail(selected):'<div class="empty">Select a ticket to view details.</div>'}</div></div>`;
}
function setFilter(f){activeFilter=f;renderTickets()}
function selectTicket(id){selectedTicketId=id;renderTickets()}
function ticketRow(t){return`<div class="ticket-row ${selectedTicketId===t.id?'selected':''}" onclick="selectTicket('${t.id}')"><div class="ticket-title"><span>${esc(t.subject||'Untitled ticket')}</span>${priorityBadge(t.priority)}</div><div class="ticket-meta">${esc(t.ticketId||t.id)} · ${esc(t.requester||'-')} · ${esc(t.category||'-')}<br>${statusBadge(t.status)} <span style="margin-left:6px">${fmtDate(t.updatedAt||t.updated)}</span></div></div>`}
function ticketDetail(t){
  const comments=(t.comments||[]).map(c=>`<div class="message"><b>${esc(c.actor||'Support')} <span class="muted">${fmtDate(c.time)}</span></b><p>${esc(c.message||'')}</p></div>`).join('');
  return`<div class="card-header" style="margin:-16px -16px 14px"><div><div>${esc(t.subject||'Untitled ticket')}</div><div class="muted">${esc(t.ticketId||t.id)} · ${esc(t.category||'-')} · opened by ${esc(t.requester||'-')}</div></div><div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end">${priorityBadge(t.priority)}${statusBadge(t.status)}</div></div>
  <div class="form-row"><div><div class="muted">Project</div><div class="strong">${esc(projectLabel(t.projectId))}</div></div><div><div class="muted">CRM</div><div class="strong">${esc(t.crmType||'CRM')}: ${esc(crmLabel(t.crmType,t.crmId))}</div></div><div><div class="muted">Assigned to</div><div class="strong">${esc(t.assigneeName||t.assignee||'Unassigned')}</div></div><div><div class="muted">Updated</div><div class="strong">${fmtDate(t.updatedAt||t.updated)}</div></div></div>
  <div class="message"><b>${esc(t.requester||'Requester')}</b><p>${esc(t.message||'')}</p></div>${comments}
  <div class="form-row"><div class="form-group"><label>Assign to</label><select id="detail-assignee"><option value="">Unassigned</option>${userOptions(t.assignee)}</select></div><div class="form-group"><label>Status</label><select id="detail-status"><option ${statusKey(t.status)==='open'?'selected':''}>Open</option><option ${statusKey(t.status)==='pending reply'?'selected':''}>Pending Reply</option><option ${statusKey(t.status)==='closed'?'selected':''}>Closed</option></select></div></div>
  <div class="form-group"><label>Reply / internal update</label><textarea id="detail-reply" placeholder="Write a reply or status note"></textarea></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px"><button class="btn primary" onclick="updateTicket('${t.id}')"><i class="ti ti-device-floppy"></i>Save Update</button><button class="btn ok" onclick="closeTicket('${t.id}')"><i class="ti ti-circle-check"></i>Close Ticket</button></div>`;
}
function ticketTable(list,actions){
  if(!list.length)return'<div class="empty">No support tickets found.</div>';
  return`<div class="table-wrap"><table><thead><tr><th>No.</th><th>Subject</th><th>Links</th><th>Requester</th><th>Priority</th><th>Status</th><th>Updated</th>${actions?'<th>Action</th>':''}</tr></thead><tbody>${list.map(t=>`<tr><td class="strong">${esc(t.ticketId||t.id)}</td><td><b>${esc(t.subject||'Untitled ticket')}</b><div class="muted">${esc(t.category||'-')}</div></td><td>${esc(projectLabel(t.projectId))}<div class="muted">${esc(t.crmType||'CRM')}: ${esc(crmLabel(t.crmType,t.crmId))}</div></td><td>${esc(t.requester||'-')}<div class="muted">Assignee: ${esc(t.assigneeName||t.assignee||'Unassigned')}</div></td><td>${priorityBadge(t.priority)}</td><td>${statusBadge(t.status)}</td><td>${esc(dateOnly(t.updatedAt||t.updated))}</td>${actions?`<td><button class="btn sm" onclick="selectedTicketId='${t.id}';switchTab('tickets')">Open</button></td>`:''}</tr>`).join('')}</tbody></table></div>`;
}
function renderNew(){
  const crmOpts=[...contactsData.map(c=>({type:'Contact',id:c.id,label:c.name||c.company||c.contact||c.id})),...dealsData.map(d=>({type:'Deal',id:d.id,label:d.title||d.dealTitle||d.id}))];
  el('tab-new').innerHTML=`<div class="card"><div class="card-header">Create support ticket</div>
    <div class="form-row"><div class="form-group"><label class="req">Requester name</label><input id="f-requester" value="${esc(roleName())}"></div><div class="form-group"><label class="req">Subject</label><input id="f-subject" placeholder="Short support issue"></div><div class="form-group"><label>Assignee</label><select id="f-assignee"><option value="">Unassigned</option>${userOptions()}</select></div></div>
    <div class="form-row"><div class="form-group"><label class="req">Category</label><select id="f-category">${(cssSettings.categories||[]).map(c=>`<option>${esc(c)}</option>`).join('')}</select></div><div class="form-group"><label class="req">Priority</label><select id="f-priority"><option>Low</option><option selected>Medium</option><option>High</option><option>Urgent</option></select></div><div class="form-group"><label>Status</label><select id="f-status"><option selected>Open</option><option>Pending Reply</option><option>Closed</option></select></div></div>
    <div class="form-row"><div class="form-group"><label>Wiki Project Link</label><select id="f-project"><option value="">Select project</option>${projectsData.map(p=>`<option value="${p.id}">${esc((p.number||'')+' '+(p.name||p.projName||''))}</option>`).join('')}</select></div><div class="form-group"><label>CRM Contact / Deal</label><select id="f-crm"><option value="">Select CRM contact/deal</option>${crmOpts.map(o=>`<option value="${o.type}|${o.id}">${o.type}: ${esc(o.label)}</option>`).join('')}</select></div></div>
    <div class="form-group"><label class="req">Details</label><textarea id="f-message" placeholder="Describe the issue, customer impact, site details and expected action"></textarea></div>
    <button class="btn primary" onclick="submitTicket()"><i class="ti ti-send"></i>Create Ticket</button>
  </div>`;
}
async function submitTicket(){
  const requester=g('f-requester'),subject=g('f-subject'),message=g('f-message'),category=g('f-category'),priority=g('f-priority'),status=g('f-status'),assignee=g('f-assignee'),projectId=g('f-project'),crmRaw=g('f-crm');
  if(!requester||!subject||!message)return showToast('Enter requester, subject and details','error');
  const [crmType,crmId]=(crmRaw||'|').split('|'),ref=db.collection(TICKET_COL).doc(),assigneeUser=usersData.find(u=>norm(u.username)===norm(assignee)||norm(u.fullName)===norm(assignee));
  const now=nowIso();
  await ref.set({ticketId:'CSS-'+ref.id.slice(0,6).toUpperCase(),requester,subject,message,category,priority,status,assignee,assigneeName:assigneeUser?.fullName||assigneeUser?.displayName||assignee,projectId,crmType,crmId,createdAt:now,updatedAt:now,createdBy:currentUser,createdByName:roleName(),audit:[{time:now,actor:roleName(),action:'Created support ticket'}]});
  showToast('Ticket created');selectedTicketId=ref.id;switchTab('tickets');
}
async function updateTicket(id){
  const t=ticketsData.find(x=>x.id===id);if(!t)return;
  const assignee=g('detail-assignee'),status=g('detail-status'),reply=g('detail-reply'),assigneeUser=usersData.find(u=>norm(u.username)===norm(assignee)||norm(u.fullName)===norm(assignee)),now=nowIso();
  const audit=[...(t.audit||[]),{time:now,actor:roleName(),action:`Updated ticket: ${status}${assignee?'; assigned to '+(assigneeUser?.fullName||assignee):''}`}];
  const comments=[...(t.comments||[])];
  if(reply)comments.push({time:now,actor:roleName(),message:reply});
  await db.collection(TICKET_COL).doc(id).update({status,assignee,assigneeName:assigneeUser?.fullName||assigneeUser?.displayName||assignee,updatedAt:now,audit,comments});
  showToast('Ticket updated');
}
async function closeTicket(id){
  const t=ticketsData.find(x=>x.id===id);if(!t)return;
  const now=nowIso(),audit=[...(t.audit||[]),{time:now,actor:roleName(),action:'Closed ticket'}];
  await db.collection(TICKET_COL).doc(id).update({status:'Closed',updatedAt:now,audit});
  showToast('Ticket closed');
}
function renderAudit(){
  const rows=ticketsData.flatMap(t=>(t.audit||[]).map(a=>({...a,ticketId:t.ticketId||t.id,subject:t.subject}))).sort((a,b)=>String(b.time).localeCompare(String(a.time)));
  el('tab-audit').innerHTML=`<div class="card"><div class="card-header">Automatic audit trail</div>${rows.length?rows.map(a=>`<div class="audit-row"><div class="muted">${esc(new Date(a.time).toLocaleString('en-IN'))}</div><div><b>${esc(a.ticketId)}</b><div class="muted">${esc(a.actor)}</div></div><div>${esc(a.action)}<div class="muted">${esc(a.subject||'')}</div></div></div>`).join(''):'<div class="empty">No audit records yet.</div>'}</div>`;
}
function renderSettings(){
  const tab=el('tab-settings');if(!tab||!canManageSettings()){if(tab)tab.innerHTML='';return}
  tab.innerHTML=`<div class="card"><div class="card-header">CSS settings <button class="btn primary sm" onclick="saveSettings()"><i class="ti ti-device-floppy"></i>Save Settings</button></div>
    <div class="form-group"><label>Ticket categories</label><textarea id="s-categories">${esc((cssSettings.categories||[]).join('\n'))}</textarea><div class="muted" style="margin-top:4px">One category per line. Used in the New Ticket form.</div></div>
  </div>`;
}
async function saveSettings(){
  if(!canManageSettings())return showToast('Only admin users can save CSS settings','error');
  const categories=g('s-categories').split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
  await db.collection(SETTINGS_COL).doc('config').set({categories,updatedAt:nowIso(),updatedBy:currentUser,updatedByName:roleName()},{merge:true});
  showToast('CSS settings saved');
}

window.addEventListener('load',initializeAuth);
document.addEventListener('DOMContentLoaded',()=>{if(!currentUser)initializeAuth()});
</script>
</body>
</html>
